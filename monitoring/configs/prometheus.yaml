global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: ml-service-remote
    scheme: http
    metrics_path: /metrics
    static_configs:
      - targets:
          - '158.160.228.178:8110'
        labels:
          service: 'ml'
          env: 'prod'
          instance: 'ml-remote-1'
