x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  user: "${AIRFLOW_UID:-50000}:0"
  env_file:
    - .env
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
    AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW__WEBSERVER__SECRET_KEY}"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "${AIRFLOW_DB_CONN}"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    db:
      condition: service_healthy

services:
  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  airflow.db.init:
    <<: *airflow-common
    container_name: airflow.db.init
    command: ["bash", "-lc", "airflow db init"]
    restart: "no"

  airflow.db.migrate:
    <<: *airflow-common
    container_name: airflow.db.migrate
    command: ["bash", "-lc", "airflow db migrate"]
    restart: "no"

  airflow.webserver:
    <<: *airflow-common
    container_name: airflow.webserver
    command: ["bash", "-lc", "airflow webserver"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  airflow.scheduler:
    <<: *airflow-common
    container_name: airflow.scheduler
    command: ["bash", "-lc", "airflow scheduler"]
    restart: unless-stopped

  airflow.triggerer:
    <<: *airflow-common
    container_name: airflow.triggerer
    command: ["bash", "-lc", "airflow triggerer"]
    restart: unless-stopped

volumes:
  postgres-data:
